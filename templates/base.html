<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      try {
        if (localStorage.getItem("theme") === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      } catch (e) {}
    })();
  </script>
  <title>{{ title }} — {{ site_name }}</title>
  {% if description %}<meta name="description" content="{{ description|e }}">{% endif %}
  <link rel="canonical" href="{{ page_url|e }}">

  <meta property="og:title" content="{{ title|e }} — {{ site_name|e }}">
  {% if description %}<meta property="og:description" content="{{ description|e }}">{% endif %}
  <meta property="og:type" content="{{ og_type or 'website' }}">
  <meta property="og:url" content="{{ page_url|e }}">
  <meta property="og:image" content="https://jackverrill.com/about-photo.jpg">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ title|e }} — {{ site_name|e }}">
  {% if description %}<meta name="twitter:description" content="{{ description|e }}">{% endif %}

  <link rel="stylesheet" href="{{ root }}style.css?v={{ asset_version }}">
</head>
<body>
  <header>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light or dark mode">☀</button>
    <div class="dateline">
      <span>Dispatches on politics &amp; technology</span>
      <span>Falmouth · Ann Arbor · London</span>
    </div>
    <a class="site-name" href="{{ root }}index.html">{{ site_name }}</a>
    <nav class="category-nav">
      {% for cat in categories %}
      <a href="{{ root }}category/{{ cat.slug }}.html">{{ cat.title }}</a>
      {% endfor %}
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>&copy; {{ year }} {{ site_name }}</p>
  </footer>
  <script>
    (function () {
      var btn = document.getElementById("theme-toggle");
      function isLight() {
        return document.documentElement.getAttribute("data-theme") === "light";
      }
      function render() {
        btn.textContent = isLight() ? "☾" : "☀";
      }
      render();
      btn.addEventListener("click", function () {
        var next = isLight() ? "dark" : "light";
        if (next === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
        try { localStorage.setItem("theme", next); } catch (e) {}
        render();
      });
    })();
  </script>
</body>
</html>
