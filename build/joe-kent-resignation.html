  <script>
    (function () {
      var btn = document.getElementById("theme-toggle");
      var embed = document.getElementById("tweet-embed");
      function isLight() {
        return document.documentElement.getAttribute("data-theme") === "light";
      }
      function renderToggle() {
        btn.textContent = isLight() ? "☾" : "☀";
      }
      function renderTweets() {
        if (!embed) return;
        var theme = isLight() ? "light" : "dark";
        embed.innerHTML =
          '<a class="twitter-timeline" data-theme="' + theme +
          '" data-width="400" data-height="340" ' +
          'data-chrome="noheader nofooter noborders transparent" ' +
          'href="https://twitter.com/jack_verri11?ref_src=twsrc%5Etfw">Tweets by jack_verri11</a>';
        if (window.twttr && window.twttr.widgets) {
          window.twttr.widgets.load(embed);
        }
      }
      renderToggle();
      btn.addEventListener("click", function () {
        var next = isLight() ? "dark" : "light";
        if (next === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
        try { localStorage.setItem("theme", next); } catch (e) {}
        renderToggle();
        renderTweets();
      });
      if (embed) {
        window.twttr = (function (d, s, id) {
          var js, fjs = d.getElementsByTagName(s)[0], t = window.twttr || {};
          if (d.getElementById(id)) return t;
          js = d.createElement(s); js.id = id;
          js.src = "https://platform.twitter.com/widgets.js";
          fjs.parentNode.insertBefore(js, fjs);
          t._e = []; t.ready = function (f) { t._e.push(f); };
          return t;
        }(document, "script", "twitter-wjs"));
        twttr.ready(function () { renderTweets(); });
      }
    })();
  </script>
